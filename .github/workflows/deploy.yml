# CI/CD — build & test the backend, deploy the frontend to GitHub Pages,
# and (on the server) roll the Docker stack with a health-checked deploy
# and automatic rollback if the new container is unhealthy.
name: HoodLust CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---- Backend: install, lint-check syntax, build image ----
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: server/package.json }
      - run: npm install
      - name: Syntax check (all modules parse)
        run: node --check src/index.js && find src -name '*.js' -exec node --check {} +
      - name: Build Docker image
        run: docker build -t hoodlust-api:${{ github.sha }} .

  # ---- Frontend: publish the static game to GitHub Pages ----
  deploy-pages:
    runs-on: ubuntu-latest
    needs: backend
    environment: { name: github-pages, url: '${{ steps.deploy.outputs.page_url }}' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Upload site (exclude server)
        run: |
          mkdir _site
          rsync -a --exclude server --exclude deploy --exclude '.git' ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deploy
        uses: actions/deploy-pages@v4

  # ---- Server: SSH deploy with health check + rollback ----
  deploy-server:
    runs-on: ubuntu-latest
    needs: backend
    if: ${{ vars.DEPLOY_SERVER == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/hoodlust
            git pull --ff-only
            docker compose pull || true
            # Tag current image for rollback.
            docker tag hoodlust-api:current hoodlust-api:previous || true
            docker compose up -d --build api
            # Health check the new container; roll back on failure.
            sleep 8
            if ! curl -fsS http://localhost:8080/api/health; then
              echo "Health check failed — rolling back"
              docker tag hoodlust-api:previous hoodlust-api:current || true
              docker compose up -d api
              exit 1
            fi
            docker tag hoodlust-api:${{ github.sha }} hoodlust-api:current || true
            docker image prune -f
