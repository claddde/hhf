# Prometheus scrape config. The backend can expose /metrics via a
# prom-client middleware (add in production); node_exporter covers host.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: hoodlust-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
