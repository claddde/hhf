# nginx reverse proxy for HoodLust — SSL termination, WebSocket upgrade,
# static frontend, and API/admin proxy to the Node backend.
# Put certs in deploy/certs/ (fullchain.pem, privkey.pem) or use certbot.

upstream hoodlust_api { server api:8080; }

# HTTP -> HTTPS redirect.
server {
  listen 80;
  server_name _;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Security headers.
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy strict-origin-when-cross-origin;

  # Static game frontend (mount the repo root here, or host on GitHub Pages).
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }

  # REST API.
  location /api/ {
    proxy_pass http://hoodlust_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Admin dashboard (served by the backend).
  location /admin/ { proxy_pass http://hoodlust_api; }

  # WebSocket (live leaderboard, chat, notifications).
  location /ws {
    proxy_pass http://hoodlust_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }
}
